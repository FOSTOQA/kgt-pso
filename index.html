<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>KGT | Cloud Operations Center V12.5</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Share+Tech+Mono&display=swap');
        :root { --primary-red: #ff0000; --bg-black: #000; --admin-gold: #ffcc00; --panel-dark: #080808; --status-green: #00ff00; }
        
        body { background: var(--bg-black); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; min-height: 100vh; overflow: hidden; }
        .mono { font-family: 'Share Tech Mono', monospace; }

        /* شاشة الدخول */
        #authOverlay { position:fixed; inset:0; background:#000; display:flex; justify-content:center; align-items:center; z-index:4000; }
        .auth-card { width:320px; text-align:center; background:#050505; padding:30px; border-radius:15px; border-top:3px solid var(--primary-red); box-shadow: 0 10px 30px rgba(255,0,0,0.2); }

        /* الواجهة الرئيسية */
        #mainDashboard { display: none; height: 100vh; padding: 15px; box-sizing: border-box; }
        .layout { display: grid; grid-template-columns: 240px 1fr 300px; gap: 15px; height: calc(100vh - 100px); }

        .kgt-list-panel { background: rgba(10,10,10,0.8); border-radius: 10px; padding: 10px; border: 1px solid #222; margin-bottom: 15px; max-height: 300px; overflow-y: auto; }
        .user-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-bottom: 1px solid #111; font-size: 13px; }
        .user-online { color: var(--status-green) !important; text-shadow: 0 0 5px var(--status-green); }
        .user-offline { color: var(--primary-red) !important; opacity: 0.6; }

        .glass-panel { background: var(--panel-dark); border: 1px solid #222; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 10px; background: #111; border-bottom: 1px solid #222; font-size: 11px; font-weight: bold; color: var(--primary-red); }
        .scroll-area { flex-grow: 1; overflow-y: auto; padding: 12px; }

        .msg { background: #121212; padding: 8px; border-radius: 6px; border-right: 3px solid var(--primary-red); margin-bottom: 8px; font-size: 13px; }
        .adm-msg { border-right-color: var(--admin-gold); background: #1a1500; }
        .btn-red { background: var(--primary-red); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        .input-dark { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; margin-bottom: 10px; outline: none; box-sizing: border-box; }
        
        /* النوافذ المنبثقة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: #0a0a0a; width: 90%; max-width: 500px; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        .mission-card { background: #111; padding: 15px; border-right: 4px solid #444; margin-bottom: 10px; border-radius: 4px; }
        .status-done { border-right-color: var(--status-green); }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-card">
            <h3 class="mono" style="color:red; margin-bottom:20px;">KGT_CLOUD_V12</h3>
            <input type="text" id="uName" class="input-dark" placeholder="اسم المستخدم">
            <input type="password" id="uPass" class="input-dark" placeholder="كلمة المرور">
            <button onclick="handleLogin()" class="btn-red">ACCESS CLOUD</button>
            <p style="font-size:10px; color:#444; margin-top:10px;">إن لم يكن لديك حساب، سيتم إنشاؤه تلقائياً</p>
        </div>
    </div>

    <div id="mainDashboard">
        <div style="display:flex; justify-content:space-between; align-items:center; background:#111; padding:12px 20px; border-radius:10px; margin-bottom:15px; border-bottom: 2px solid var(--primary-red);">
            <div class="mono">
                <span id="admBadge" style="display:none; color:gold;">[ADMIN]</span>
                <span id="userDisp" style="color:var(--status-green);">---</span>
            </div>
            <div id="liveClock" class="mono" style="color:red; font-weight:bold;">00:00:00</div>
        </div>

        <div class="layout">
            <div class="left-side">
                <button id="statusBtn" class="btn-red" style="background:#1a1a1a; margin-bottom:15px; border:1px solid #333;" onclick="toggleDuty()">OFF DUTY</button>
                
                <div class="kgt-list-panel">
                    <div id="onlineList"></div>
                </div>

                <button class="btn-red" style="margin-top:10px;" onclick="openModal('missionModal')">المهمات الميدانية</button>
                <button class="btn-red admin-only" id="adminBtn" style="margin-top:8px; background:gold; color:black; display:none;" onclick="openModal('addMissionModal')">تعيين مهمة</button>
                <button class="btn-red" style="margin-top:8px; background:#222;" onclick="logout()">خروج</button>
            </div>

            <div class="glass-panel">
                <div class="panel-header">SECURE_CHAT</div>
                <div class="scroll-area" id="chatScroll"><div id="chatBox"></div></div>
                <div style="padding:15px; background:#111; display:flex; gap:10px;">
                    <input type="text" id="msgInput" class="input-dark" style="margin:0;" placeholder="اكتب رسالة..." onkeydown="if(event.key==='Enter') sendMsg()">
                    <button onclick="sendMsg()" class="btn-red" style="width:70px;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
            
            <div class="glass-panel">
                <div class="panel-header">SYSTEM_LOGS</div>
                <div id="logs" class="scroll-area mono" style="font-size:11px; color:#00ff00; background:#050505;">
                    > Initializing Firebase Connectivity...<br>
                    > Global Sync Ready.
                </div>
            </div>
        </div>
    </div>

    <div id="missionModal" class="modal"><div class="modal-content"><h3>العمليات</h3><div id="missionsDisplay"></div><button onclick="closeModal('missionModal')" class="btn-red">إغلاق</button></div></div>
    <div id="addMissionModal" class="modal"><div class="modal-content"><h3>مهمة جديدة</h3><input id="mTitle" class="input-dark" placeholder="العنوان"><textarea id="mBody" class="input-dark" placeholder="التفاصيل"></textarea><button onclick="addMission()" class="btn-red">نشر المهمة</button></div></div>

    <script>
        // 2. إعدادات Firebase الخاصة بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyCv83iGc9nqypGA2ER0Wrd1tup10Th2Vfs",
            authDomain: "kgtsystem.firebaseapp.com",
            projectId: "kgtsystem",
            storageBucket: "kgtsystem.firebasestorage.app",
            messagingSenderId: "1021670996722",
            appId: "1:1021670996722:web:b75cb25363121377276e6b",
            databaseURL: "https://kgtsystem-default-rtdb.firebaseio.com"
        };

        // تشغيل Firebase
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = sessionStorage.getItem("kgt_user") || "";
        let isAdmin = sessionStorage.getItem("kgt_admin") === "true";
        let onDutyState = false;

        // 3. نظام تسجيل الدخول وإنشاء الحساب
        function handleLogin() {
            const u = document.getElementById('uName').value.trim();
            const p = document.getElementById('uPass').value.trim();
            if(!u || !p) return alert("اكمل البيانات");

            const userRef = db.ref('users/' + u);
            userRef.once('value', (s) => {
                const userData = s.val();
                if(userData) {
                    if(userData.pass === p) {
                        loginSuccess(u, userData.isAdmin);
                    } else {
                        alert("كلمة المرور غير صحيحة");
                    }
                } else {
                    const isNewAdmin = u.toLowerCase().includes('admin');
                    const newUser = { name: u, pass: p, isAdmin: isNewAdmin, onDuty: false };
                    userRef.set(newUser).then(() => loginSuccess(u, isNewAdmin));
                }
            });
        }

        function loginSuccess(u, admin) {
            sessionStorage.setItem("kgt_user", u);
            sessionStorage.setItem("kgt_admin", admin);
            location.reload();
        }

        // 4. العمليات عند تشغيل الموقع
        if(currentUser) {
            document.getElementById('authOverlay').style.display='none';
            document.getElementById('mainDashboard').style.display='block';
            document.getElementById('userDisp').innerText = currentUser;
            
            if(isAdmin) {
                document.getElementById('adminBtn').style.display = 'block';
                document.getElementById('admBadge').style.display = 'inline';
            }

            // مزامنة الشات
            db.ref('chat').limitToLast(30).on('value', (s) => {
                let html = "";
                s.forEach(snap => {
                    const m = snap.val();
                    html += `<div class="msg ${m.isAdm?'adm-msg':''}"><b>${m.user}:</b> ${m.text}</div>`;
                });
                document.getElementById('chatBox').innerHTML = html;
                document.getElementById('chatScroll').scrollTop = document.getElementById('chatScroll').scrollHeight;
            });

            // مزامنة المستخدمين
            db.ref('users').on('value', (s) => {
                let html = "";
                s.forEach(snap => {
                    const u = snap.val();
                    if(u.name === currentUser) onDutyState = u.onDuty;
                    const stClass = u.onDuty ? 'user-online' : 'user-offline';
                    html += `<div class="user-item"><span class="${stClass}"><i class="fas fa-circle" style="font-size:8px;"></i> ${u.name}</span> <small style="color:#444;">${u.isAdmin?'[ADM]':'[OP]'}</small></div>`;
                });
                document.getElementById('onlineList').innerHTML = html;
                const sBtn = document.getElementById('statusBtn');
                sBtn.innerText = onDutyState ? "ON DUTY" : "OFF DUTY";
                sBtn.style.color = onDutyState ? "var(--status-green)" : "#fff";
                sBtn.style.borderColor = onDutyState ? "var(--status-green)" : "#333";
            });

            // مزامنة المهام
            db.ref('missions').on('value', (s) => {
                let html = "";
                s.forEach(snap => {
                    const m = snap.val();
                    const id = snap.key;
                    html += `<div class="mission-card ${m.status==='done'?'status-done':''}">
                        <b>${m.title}</b><p style="font-size:12px; color:#aaa;">${m.body}</p>
                        ${isAdmin ? `<button onclick="db.ref('missions/${id}').remove()" style="background:#400; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer; font-size:10px;">حذف</button>` : ''}
                    </div>`;
                });
                document.getElementById('missionsDisplay').innerHTML = html || "لا يوجد عمليات حالية";
            });
        }

        // الوظائف المساعدة
        function sendMsg() {
            const inp = document.getElementById('msgInput');
            if(!inp.value.trim()) return;
            db.ref('chat').push({ user: currentUser, text: inp.value, isAdm: isAdmin });
            inp.value = "";
        }

        function addMission() {
            const t = document.getElementById('mTitle').value;
            const b = document.getElementById('mBody').value;
            if(t) {
                db.ref('missions').push({ title: t, body: b, status: 'pending' });
                closeModal('addMissionModal');
            }
        }

        function toggleDuty() {
            db.ref('users/' + currentUser).update({ onDuty: !onDutyState });
        }

        function logout() { sessionStorage.clear(); location.reload(); }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
